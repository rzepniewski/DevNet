<div class="slide" data-section="perceptron" data-order="2">
    <div class="slide-content">
        <span class="tag">Perceptron</span>
        <h2>The Single Neuron</h2>
        <p class="fragment fade-up">A perceptron computes a weighted sum of inputs:</p>
        <div class="math-block fragment fade-up">
            z =
            <span class="math-sum">
                <span class="limit-upper">n</span>
                <span class="operator">&Sigma;</span>
                <span class="limit-lower">i=1</span>
            </span>
            w<sub>i</sub> x<sub>i</sub> + b
        </div>
        <p class="fragment fade-up">Then applies an activation function:</p>
        <div class="math-block fragment fade-up">
            y = &sigma;(z) = &sigma;(w<sup>T</sup>x + b)
        </div>
    </div>
</div>
