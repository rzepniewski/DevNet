<div class="slide" data-section="activation" data-order="3">
    <div class="slide-content">
        <span class="tag">Activation</span>
        <h2>Activation Functions</h2>
        <div class="cards-grid">
            <div class="card fragment fade-up">
                <h4>Sigmoid</h4>
                <div class="math-block">
                    &sigma;(z) =
                    <span class="math-frac">
                        <span class="numerator">1</span>
                        <span class="denominator">1 + e<sup>&minus;z</sup></span>
                    </span>
                </div>
                <p>Output range: (0, 1)</p>
            </div>
            <div class="card fragment fade-up">
                <h4>ReLU</h4>
                <div class="math-block">
                    f(z) = max(0, z)
                </div>
                <p>Most popular for hidden layers</p>
            </div>
            <div class="card fragment fade-up">
                <h4>Tanh</h4>
                <div class="math-block">
                    tanh(z) =
                    <span class="math-frac">
                        <span class="numerator">e<sup>z</sup> &minus; e<sup>&minus;z</sup></span>
                        <span class="denominator">e<sup>z</sup> + e<sup>&minus;z</sup></span>
                    </span>
                </div>
                <p>Output range: (-1, 1)</p>
            </div>
        </div>
    </div>
</div>
