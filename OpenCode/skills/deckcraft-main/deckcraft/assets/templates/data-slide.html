<!-- DATA/TABLE SLIDE TEMPLATE
     For data presentation, feature matrices, pricing tables, comparisons
     Replace content in {BRACES} with your values

     Uses: .table-container, table styling from presentation.css

     Row Highlighting:
       - Add style="background: var(--white-10);" to <tr> for emphasis
       - Or add a custom class for consistent highlighting
-->
<div class="slide" data-section="{SECTION}" data-order="{ORDER}">
    <div class="slide-content">
        <span class="tag">{Section Label}</span>
        <h2>{Data Title}</h2>
        <p>{Description of what the data shows}</p>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>{Column 1}</th>
                        <th>{Column 2}</th>
                        <th>{Column 3}</th>
                        <th>{Column 4}</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>{Row 1 Data}</td>
                        <td>{Data}</td>
                        <td>{Data}</td>
                        <td>{Data}</td>
                    </tr>
                    <tr>
                        <td>{Row 2 Data}</td>
                        <td>{Data}</td>
                        <td>{Data}</td>
                        <td>{Data}</td>
                    </tr>
                    <!-- Highlighted row - use inline style for emphasis -->
                    <tr style="background: var(--white-10);">
                        <td><strong>{Important Row}</strong></td>
                        <td>{Data}</td>
                        <td>{Data}</td>
                        <td>{Data}</td>
                    </tr>
                    <tr>
                        <td>{Row 4 Data}</td>
                        <td>{Data}</td>
                        <td>{Data}</td>
                        <td>{Data}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
