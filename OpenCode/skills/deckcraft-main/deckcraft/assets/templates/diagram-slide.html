<!-- DIAGRAM/FLOW SLIDE TEMPLATE
     For process flows, architecture diagrams, pipelines
     Replace content in {BRACES} with your values
-->
<div class="slide" data-section="{SECTION}" data-order="{ORDER}">
    <div class="slide-content">
        <span class="tag">{Section Label}</span>
        <h2>{Process Title}</h2>
        <p>{Brief description of the process}</p>

        <div class="diagram">
            <div class="flow-diagram">
                <div class="flow-box">
                    <h4>{Step 1}</h4>
                    <p>{Description}</p>
                </div>
                <div class="flow-arrow">&rarr;</div>
                <div class="flow-box highlight">
                    <h4>{Step 2}</h4>
                    <p>{Description}</p>
                </div>
                <div class="flow-arrow">&rarr;</div>
                <div class="flow-box">
                    <h4>{Step 3}</h4>
                    <p>{Description}</p>
                </div>
            </div>
        </div>

        <div class="highlight-box">
            <p>{Key takeaway or summary}</p>
        </div>
    </div>
</div>
