<div class="slide" data-section="training" data-order="4">
    <div class="slide-content">
        <span class="tag">Training</span>
        <h2>Loss Functions</h2>
        <h3 class="fragment fade-in">Cross-Entropy Loss</h3>
        <div class="math-block fragment fade-in">
            L = &minus;
            <span class="math-sum">
                <span class="limit-upper">C</span>
                <span class="operator">&Sigma;</span>
                <span class="limit-lower">i=1</span>
            </span>
            y<sub>i</sub> log(&#x177;<sub>i</sub>)
        </div>
        <h3 class="fragment fade-in">Mean Squared Error</h3>
        <div class="math-block fragment fade-in">
            MSE =
            <span class="math-frac">
                <span class="numerator">1</span>
                <span class="denominator">n</span>
            </span>
            <span class="math-sum">
                <span class="limit-upper">n</span>
                <span class="operator">&Sigma;</span>
                <span class="limit-lower">i=1</span>
            </span>
            (y<sub>i</sub> &minus; &#x177;<sub>i</sub>)<sup>2</sup>
        </div>
    </div>
</div>
